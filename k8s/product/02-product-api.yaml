---
# Mock internal product-api service (echo server)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
  namespace: product
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
    spec:
      containers:
        - name: api
          image: kennethreitz/httpbin:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /get
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-api
  namespace: product
spec:
  selector:
    app: product-api
  ports:
    - port: 80
      targetPort: 80
