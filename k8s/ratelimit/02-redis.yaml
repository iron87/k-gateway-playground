---
# StatefulSet: Redis for RateLimit service state
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ratelimit
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Service: Redis endpoint
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ratelimit
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
